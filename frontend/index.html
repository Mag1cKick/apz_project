<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RobotOps</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root { --bg: #0f1117; --surface: #1e2130; --border: #2d3347; --accent: #4fc3f7; }
body { background: var(--bg); color: #e1e4e8; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

/* Auth */
#auth-page { min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#0f1117,#1a1f2e); }
.auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:420px; box-shadow:0 20px 60px rgba(0,0,0,.5); }
.logo-title { font-size:2rem; font-weight:700; background:linear-gradient(135deg,#4fc3f7,#0d6efd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

/* Navbar */
nav.top { background:var(--surface); border-bottom:1px solid var(--border); padding:.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }

/* Robot cards */
.robot-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.4rem; transition:.2s; height:100%; }
.robot-card:hover { border-color:var(--accent); transform:translateY(-2px); }

/* Table */
.dark-table { background:var(--surface); border-radius:12px; overflow:hidden; }
.table { color:#e1e4e8; margin:0; }
.table thead th { background:#242938; border-color:var(--border); color:#8892a4; font-weight:500; text-transform:uppercase; font-size:.72rem; letter-spacing:.05em; }
.table tbody td { border-color:var(--border); vertical-align:middle; }
.table tbody tr:hover { background:rgba(79,195,247,.04); }

/* Form controls */
.form-control,.form-select { background:#0f1117; border:1px solid var(--border); color:#e1e4e8; }
.form-control:focus,.form-select:focus { background:#0f1117; border-color:#0d6efd; color:#e1e4e8; box-shadow:0 0 0 3px rgba(13,110,253,.2); }
.form-control::placeholder { color:#555f6e; }

/* Nav tabs */
.nav-tabs { border-bottom:1px solid var(--border); }
.nav-tabs .nav-link { color:#8892a4; border:none; padding:.7rem 1.4rem; border-radius:0; }
.nav-tabs .nav-link.active { background:none; border-bottom:2px solid #0d6efd; color:var(--accent); }
.nav-tabs .nav-link:hover:not(.active) { color:#e1e4e8; border-color:transparent; }

/* Modal */
.modal-content { background:var(--surface); border:1px solid var(--border); border-radius:16px; }
.modal-header,.modal-footer { border-color:var(--border); }

/* Auth tabs */
.auth-tabs .nav-link { color:#8892a4; border:none; }
.auth-tabs .nav-link.active { color:var(--accent); border-bottom:2px solid var(--accent); background:none; }

/* Misc */
.pulse { display:inline-block; width:8px; height:8px; background:#28a745; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.empty-state { text-align:center; padding:3rem; color:#555f6e; }
.empty-state i { font-size:2.5rem; display:block; margin-bottom:.75rem; }
.cap-badge { background:#1a2744; color:#4fc3f7; border:1px solid #1e3a5f; font-size:.7rem; }
</style>
</head>
<body>

<!-- AUTH ──────────────────────────────────────────────────────── -->
<div id="auth-page">
  <div class="auth-card">
    <div class="text-center mb-4">
      <i class="bi bi-robot" style="font-size:2.5rem;color:var(--accent)"></i>
      <div class="logo-title mt-1">RobotOps</div>
      <div class="text-muted small">Robot Fleet Management</div>
    </div>

    <ul class="nav nav-tabs auth-tabs mb-4">
      <li class="nav-item"><button class="nav-link active" id="tabLogin" onclick="showAuthTab('login')">Увійти</button></li>
      <li class="nav-item"><button class="nav-link" id="tabReg" onclick="showAuthTab('register')">Реєстрація</button></li>
    </ul>

    <div id="loginForm">
      <div class="mb-3">
        <label class="form-label small text-muted">Username</label>
        <input class="form-control" id="loginUser" placeholder="your_username" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div class="mb-4">
        <label class="form-label small text-muted">Password</label>
        <input type="password" class="form-control" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
      </div>
      <button class="btn btn-primary w-100" onclick="login()"><i class="bi bi-box-arrow-in-right me-2"></i>Увійти</button>
    </div>

    <div id="registerForm" style="display:none">
      <div class="mb-3">
        <label class="form-label small text-muted">Username</label>
        <input class="form-control" id="regUser" placeholder="your_username">
      </div>
      <div class="mb-3">
        <label class="form-label small text-muted">Email</label>
        <input type="email" class="form-control" id="regEmail" placeholder="you@example.com">
      </div>
      <div class="mb-4">
        <label class="form-label small text-muted">Password</label>
        <input type="password" class="form-control" id="regPass" placeholder="••••••••">
      </div>
      <button class="btn btn-primary w-100" onclick="register()"><i class="bi bi-person-plus me-2"></i>Зареєструватися</button>
    </div>

    <div id="authErr" class="alert alert-danger mt-3 py-2 small" style="display:none"></div>
  </div>
</div>

<!-- DASHBOARD ─────────────────────────────────────────────────── -->
<div id="dashboard" style="display:none">

  <nav class="top">
    <div class="d-flex align-items-center gap-3">
      <i class="bi bi-robot" style="font-size:1.4rem;color:var(--accent)"></i>
      <span class="fw-bold" style="font-size:1.1rem">RobotOps</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="text-muted small"><i class="bi bi-person-circle me-1"></i><span id="navUser">—</span></span>
      <button class="btn btn-outline-secondary btn-sm" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>Вийти</button>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">
    <ul class="nav nav-tabs mb-4">
      <li class="nav-item">
        <button class="nav-link active" id="tabRobots" onclick="switchTab('robots')">
          <i class="bi bi-robot me-2"></i>Роботи
          <span id="robotCount" class="badge bg-secondary ms-1">0</span>
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="tabMissions" onclick="switchTab('missions')">
          <i class="bi bi-list-task me-2"></i>Місії
          <span id="activeBadge" class="badge bg-warning text-dark ms-1" style="display:none"></span>
        </button>
      </li>
    </ul>

    <!-- ROBOTS ──────────────────────────────────────────────── -->
    <div id="panelRobots">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Fleet Overview</h5>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalRobot">
          <i class="bi bi-plus-lg me-1"></i>Додати робота
        </button>
      </div>
      <div id="robotsGrid" class="row g-3"></div>
    </div>

    <!-- MISSIONS ─────────────────────────────────────────────── -->
    <div id="panelMissions" style="display:none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-3">
          <h5 class="mb-0">Mission Control</h5>
          <span class="text-muted small"><span class="pulse me-1"></span>live refresh</span>
        </div>
        <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modalMission">
          <i class="bi bi-plus-lg me-1"></i>Нова місія
        </button>
      </div>
      <div class="dark-table">
        <table class="table">
          <thead><tr>
            <th>Назва</th><th>Робот</th><th>Статус</th>
            <th>Пріоритет</th><th>Створено</th><th>Завершено</th>
          </tr></thead>
          <tbody id="missionsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Add Robot ──────────────────────────────────────────── -->
<div class="modal fade" id="modalRobot" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-robot me-2" style="color:var(--accent)"></i>Новий робот</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small text-muted">Назва</label>
          <input class="form-control" id="rName" placeholder="Wall-E">
        </div>
        <div class="row g-3 mb-3">
          <div class="col">
            <label class="form-label small text-muted">Тип</label>
            <select class="form-select" id="rType">
              <option value="mobile">Mobile</option>
              <option value="industrial">Industrial</option>
              <option value="drone">Drone</option>
              <option value="manipulator">Manipulator</option>
            </select>
          </div>
          <div class="col">
            <label class="form-label small text-muted">Модель</label>
            <input class="form-control" id="rModel" placeholder="v2.1">
          </div>
        </div>
        <div>
          <label class="form-label small text-muted">Capabilities (через кому)</label>
          <input class="form-control" id="rCaps" placeholder="navigate, pick, place">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createRobot()"><i class="bi bi-plus-lg me-1"></i>Створити</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Add Mission ────────────────────────────────────────── -->
<div class="modal fade" id="modalMission" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-send me-2" style="color:var(--accent)"></i>Нова місія</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label small text-muted">Назва</label>
          <input class="form-control" id="mTitle" placeholder="Patrol sector A">
        </div>
        <div class="mb-3">
          <label class="form-label small text-muted">Опис</label>
          <textarea class="form-control" id="mDesc" rows="2" placeholder="необов'язково"></textarea>
        </div>
        <div class="row g-3">
          <div class="col-8">
            <label class="form-label small text-muted">Робот</label>
            <select class="form-select" id="mRobot">
              <option value="">— без прив'язки —</option>
            </select>
          </div>
          <div class="col-4">
            <label class="form-label small text-muted">Пріоритет</label>
            <select class="form-select" id="mPriority">
              <option value="1">1 — Low</option>
              <option value="2">2 — Normal</option>
              <option value="3" selected>3 — High</option>
              <option value="5">5 — Critical</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Скасувати</button>
        <button class="btn btn-primary" onclick="createMission()"><i class="bi bi-send me-1"></i>Відправити</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast ─────────────────────────────────────────────────────── -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="toast" class="toast text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body fw-medium" id="toastMsg"></div>
      <button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────
const S = {
  token: localStorage.getItem('token'),
  username: localStorage.getItem('username'),
  robots: [],
  missions: [],
  refreshId: null,
};

// ── API ──────────────────────────────────────────────────────
async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(S.token ? { Authorization: `Bearer ${S.token}` } : {}),
    },
    ...(body ? { body: JSON.stringify(body) } : {}),
  });
  if (r.status === 204) return null;
  const d = await r.json();
  if (!r.ok) throw new Error(d.detail || JSON.stringify(d));
  return d;
}

// ── Toast ────────────────────────────────────────────────────
function notify(msg, ok = true) {
  const el = document.getElementById('toast');
  el.className = `toast text-white border-0 bg-${ok ? 'success' : 'danger'}`;
  document.getElementById('toastMsg').textContent = msg;
  new bootstrap.Toast(el, { delay: 3000 }).show();
}

function err(e) { notify(e.message, false); }

// ── Auth ─────────────────────────────────────────────────────
function showAuthTab(tab) {
  document.getElementById('loginForm').style.display   = tab === 'login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabReg').classList.toggle('active', tab === 'register');
  document.getElementById('authErr').style.display = 'none';
}

async function login() {
  try {
    const d = await api('POST', '/auth/login', {
      username: document.getElementById('loginUser').value,
      password: document.getElementById('loginPass').value,
    });
    S.token = d.access_token;
    S.username = document.getElementById('loginUser').value;
    localStorage.setItem('token', S.token);
    localStorage.setItem('username', S.username);
    showDashboard();
  } catch (e) {
    document.getElementById('authErr').textContent = e.message;
    document.getElementById('authErr').style.display = '';
  }
}

async function register() {
  try {
    await api('POST', '/auth/register', {
      username: document.getElementById('regUser').value,
      email:    document.getElementById('regEmail').value,
      password: document.getElementById('regPass').value,
    });
    notify('Зареєстровано! Тепер увійдіть.');
    showAuthTab('login');
  } catch (e) {
    document.getElementById('authErr').textContent = e.message;
    document.getElementById('authErr').style.display = '';
  }
}

async function logout() {
  try { await api('POST', '/auth/logout'); } catch {}
  S.token = null;
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  clearInterval(S.refreshId);
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-page').style.display = 'flex';
}

// ── Dashboard ─────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('auth-page').style.display = 'none';
  document.getElementById('dashboard').style.display = '';
  document.getElementById('navUser').textContent = S.username;
  loadRobots();
  startRefresh();
}

function switchTab(tab) {
  document.getElementById('panelRobots').style.display   = tab === 'robots'   ? '' : 'none';
  document.getElementById('panelMissions').style.display = tab === 'missions'  ? '' : 'none';
  document.getElementById('tabRobots').classList.toggle('active',   tab === 'robots');
  document.getElementById('tabMissions').classList.toggle('active', tab === 'missions');
}

// ── Robots ────────────────────────────────────────────────────
const STATUS_COLOR = { online:'success', offline:'secondary', busy:'warning', maintenance:'info' };
const TYPE_ICON    = { mobile:'bi-truck', industrial:'bi-gear-wide-connected', drone:'bi-airplane', manipulator:'bi-hand-index' };

async function loadRobots() {
  try {
    S.robots = await api('GET', '/robots/');
    renderRobots();
  } catch {}
}

function renderRobots() {
  document.getElementById('robotCount').textContent = S.robots.length;
  const g = document.getElementById('robotsGrid');
  if (!S.robots.length) {
    g.innerHTML = `<div class="col-12 empty-state"><i class="bi bi-robot"></i>Немає роботів. Додайте першого!</div>`;
    return;
  }
  g.innerHTML = S.robots.map(r => `
    <div class="col-12 col-md-6 col-xl-4">
      <div class="robot-card">
        <div class="d-flex justify-content-between align-items-start mb-3">
          <div>
            <div class="fw-semibold fs-5">${r.name}</div>
            <div class="text-muted small">${r.model}</div>
          </div>
          <i class="bi ${TYPE_ICON[r.type]||'bi-robot'}" style="font-size:1.8rem;color:var(--accent)"></i>
        </div>
        <div class="d-flex gap-2 mb-3 flex-wrap">
          <span class="badge bg-${STATUS_COLOR[r.status]||'secondary'}">${r.status}</span>
          <span class="badge bg-dark border border-secondary">${r.type}</span>
        </div>
        ${r.capabilities.length ? `<div class="d-flex flex-wrap gap-1 mb-3">
          ${r.capabilities.map(c=>`<span class="badge cap-badge">${c}</span>`).join('')}
        </div>` : ''}
        <select class="form-select form-select-sm mt-2" style="width:auto" onchange="updateStatus('${r.id}',this.value)">
          ${['online','offline','busy','maintenance'].map(s=>`<option ${r.status===s?'selected':''} value="${s}">${s}</option>`).join('')}
        </select>
      </div>
    </div>`).join('');
}

async function createRobot() {
  try {
    const caps = document.getElementById('rCaps').value.split(',').map(s=>s.trim()).filter(Boolean);
    await api('POST', '/robots/', {
      name: document.getElementById('rName').value,
      type: document.getElementById('rType').value,
      model: document.getElementById('rModel').value,
      capabilities: caps,
    });
    bootstrap.Modal.getInstance(document.getElementById('modalRobot')).hide();
    notify('Робота додано!');
    loadRobots();
  } catch(e) { err(e); }
}

async function updateStatus(id, status) {
  try {
    await api('PATCH', `/robots/${id}`, { status });
    notify(`Статус → ${status}`);
    loadRobots();
  } catch(e) { err(e); }
}

// ── Missions ──────────────────────────────────────────────────
const M_STATUS = {
  pending:   ['secondary','bi-clock'],
  queued:    ['warning',  'bi-hourglass-split'],
  active:    ['primary',  'bi-play-circle-fill'],
  completed: ['success',  'bi-check-circle-fill'],
  failed:    ['danger',   'bi-x-circle-fill'],
};

function startRefresh() {
  loadMissions();
  S.refreshId = setInterval(loadMissions, 3000);
}

async function loadMissions() {
  try {
    S.missions = await api('GET', '/missions/');
    renderMissions();
  } catch {}
}

function renderMissions() {
  const active = S.missions.filter(m => ['queued','active'].includes(m.status)).length;
  const badge = document.getElementById('activeBadge');
  badge.textContent = active;
  badge.style.display = active ? '' : 'none';

  const tbody = document.getElementById('missionsBody');
  if (!S.missions.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
      <i class="bi bi-list-task d-block mb-2"></i>Місій ще немає</td></tr>`;
    return;
  }
  tbody.innerHTML = S.missions.map(m => {
    const [color, icon] = M_STATUS[m.status] || M_STATUS.pending;
    const robot = S.robots.find(r => r.id === m.robot_id);
    const t = d => new Date(d).toLocaleTimeString('uk-UA', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
    return `<tr>
      <td class="fw-medium">${m.title}</td>
      <td class="text-muted">${robot ? `<i class="bi bi-robot me-1"></i>${robot.name}` : '—'}</td>
      <td><span class="badge bg-${color}"><i class="bi ${icon} me-1"></i>${m.status}</span></td>
      <td><span class="badge bg-dark border border-secondary">${'★'.repeat(Math.min(m.priority,5))}</span></td>
      <td class="text-muted small">${t(m.created_at)}</td>
      <td class="text-muted small">${m.completed_at ? t(m.completed_at) : '—'}</td>
    </tr>`;
  }).join('');
}

async function createMission() {
  try {
    await api('POST', '/missions/', {
      title:       document.getElementById('mTitle').value,
      description: document.getElementById('mDesc').value || null,
      robot_id:    document.getElementById('mRobot').value || null,
      priority:    parseInt(document.getElementById('mPriority').value),
    });
    bootstrap.Modal.getInstance(document.getElementById('modalMission')).hide();
    notify('Місію відправлено в чергу!');
    switchTab('missions');
  } catch(e) { err(e); }
}

document.getElementById('modalMission').addEventListener('show.bs.modal', () => {
  document.getElementById('mRobot').innerHTML =
    `<option value="">— без прив'язки —</option>` +
    S.robots.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
});

// ── Init ──────────────────────────────────────────────────────
if (S.token) showDashboard();
</script>
</body>
</html>
