events {}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream auth_upstream {
        server auth-service-1:8001;
        server auth-service-2:8001;
    }

    upstream robot_upstream {
        server robot-service:8002;
    }

    upstream mission_upstream {
        server mission-service:8003;
    }

    server {
        listen 80;

        # ── Frontend ──────────────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ── API proxy ─────────────────────────────────────────
        location /auth {
            proxy_pass       http://auth_upstream;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Authorization   $http_authorization;
        }

        location /robots {
            proxy_pass       http://robot_upstream;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Authorization   $http_authorization;
        }

        location /missions {
            proxy_pass       http://mission_upstream;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Authorization   $http_authorization;
        }
    }
}
