services:

  # ─────────────────────────────────────────
  # Consul — Service Discovery, Registry & Config
  # ─────────────────────────────────────────
  consul:
    image: hashicorp/consul:${CONSUL_VERSION:-1.18}
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Consul KV Seed — writes Hazelcast config
  # into Consul KV on boot, then exits.
  # This is the single source of truth for
  # Hazelcast connection settings.
  # ─────────────────────────────────────────
  consul-seed:
    image: hashicorp/consul:${CONSUL_VERSION:-1.18}
    restart: "no"
    depends_on:
      consul:
        condition: service_healthy
    environment:
      CONSUL_HTTP_ADDR: consul:8500
    entrypoint:
      - sh
      - -c
      - |
        consul kv put config/hazelcast/members      "hazelcast1:5701,hazelcast2:5701,hazelcast3:5701"
        consul kv put config/hazelcast/cluster-name "robotops-hz"
        consul kv put config/hazelcast/queue-name   "mission-queue"
        echo "Consul KV seeded successfully."
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # API Gateway (nginx + consul-template)
  # ─────────────────────────────────────────
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      consul:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Auth Service  (2 instances — HA + Redis)
  # ─────────────────────────────────────────
  auth-service-1:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      SERVICE_PORT: ${AUTH_SERVICE_PORT}
      POSTGRES_URL: ${POSTGRES_AUTH_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - robotops-net

  auth-service-2:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    environment:
      SERVICE_PORT: ${AUTH_SERVICE_PORT}
      POSTGRES_URL: ${POSTGRES_AUTH_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      consul:
        condition: service_healthy
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Robot Service  (MongoDB Replica Set)
  # ─────────────────────────────────────────
  robot-service:
    build:
      context: .
      dockerfile: robot-service/Dockerfile
    environment:
      SERVICE_PORT: ${ROBOT_SERVICE_PORT}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: ${MONGO_DB:-robot_db}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      consul:
        condition: service_healthy
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Mission Service  (PostgreSQL + Hazelcast)
  # Hazelcast config read from Consul KV
  # ─────────────────────────────────────────
  mission-service:
    build:
      context: .
      dockerfile: mission-service/Dockerfile
    environment:
      SERVICE_PORT: ${MISSION_SERVICE_PORT}
      POSTGRES_URL: ${POSTGRES_MISSION_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mission-db:
        condition: service_healthy
      hazelcast1:
        condition: service_healthy
      hazelcast2:
        condition: service_healthy
      hazelcast3:
        condition: service_healthy
      consul:
        condition: service_healthy
      consul-seed:
        condition: service_completed_successfully
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # PostgreSQL — Auth
  # ─────────────────────────────────────────
  auth-db:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_USER}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_DB}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER} -d ${POSTGRES_AUTH_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # PostgreSQL — Missions
  # ─────────────────────────────────────────
  mission-db:
    image: postgres:${POSTGRES_VERSION:-15-alpine}
    environment:
      POSTGRES_USER: ${POSTGRES_MISSION_USER}
      POSTGRES_PASSWORD: ${POSTGRES_MISSION_PASSWORD}
      POSTGRES_DB: ${POSTGRES_MISSION_DB}
    volumes:
      - mission-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MISSION_USER} -d ${POSTGRES_MISSION_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # MongoDB Replica Set  (3 nodes)
  # ─────────────────────────────────────────
  mongo1:
    image: mongo:${MONGO_VERSION:-6}
    command: mongod --replSet ${MONGO_REPLICASET:-rs0} --bind_ip_all
    volumes:
      - mongo1-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok === 1 || quit(1)", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo2:
    image: mongo:${MONGO_VERSION:-6}
    command: mongod --replSet ${MONGO_REPLICASET:-rs0} --bind_ip_all
    volumes:
      - mongo2-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok === 1 || quit(1)", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo3:
    image: mongo:${MONGO_VERSION:-6}
    command: mongod --replSet ${MONGO_REPLICASET:-rs0} --bind_ip_all
    volumes:
      - mongo3-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok === 1 || quit(1)", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo-init:
    image: mongo:${MONGO_VERSION:-6}
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    environment:
      MONGO_HOST_1: ${MONGO_HOST_1:-mongo1}
      MONGO_HOST_2: ${MONGO_HOST_2:-mongo2}
      MONGO_HOST_3: ${MONGO_HOST_3:-mongo3}
      MONGO_PORT: ${MONGO_PORT:-27017}
      MONGO_REPLICASET: ${MONGO_REPLICASET:-rs0}
    entrypoint:
      - mongosh
      - --host
      - ${MONGO_HOST_1:-mongo1}:${MONGO_PORT:-27017}
      - --eval
      - |
        var s = rs.status();
        if (s.ok !== 1) {
          rs.initiate({
            _id: '${MONGO_REPLICASET:-rs0}',
            members: [
              {_id: 0, host: '${MONGO_HOST_1:-mongo1}:${MONGO_PORT:-27017}', priority: 2},
              {_id: 1, host: '${MONGO_HOST_2:-mongo2}:${MONGO_PORT:-27017}', priority: 1},
              {_id: 2, host: '${MONGO_HOST_3:-mongo3}:${MONGO_PORT:-27017}', priority: 1}
            ]
          });
          print('Replica set initiated');
        } else {
          print('Replica set already initialized');
        }
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Redis  (JWT store, shared across auth instances)
  # ─────────────────────────────────────────
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Hazelcast Cluster  (3 nodes — Queue + Map)
  # ─────────────────────────────────────────
  hazelcast1:
    image: hazelcast/hazelcast:${HAZELCAST_VERSION:-5.3}
    environment:
      HZ_CLUSTERNAME: ${HAZELCAST_CLUSTER_NAME:-robotops-hz}
      JDK_JAVA_OPTIONS: "-Dhazelcast.config=/hazelcast.yaml"
    volumes:
      - ./hazelcast/hazelcast.yaml:/hazelcast.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - robotops-net

  hazelcast2:
    image: hazelcast/hazelcast:${HAZELCAST_VERSION:-5.3}
    environment:
      HZ_CLUSTERNAME: ${HAZELCAST_CLUSTER_NAME:-robotops-hz}
      JDK_JAVA_OPTIONS: "-Dhazelcast.config=/hazelcast.yaml"
    volumes:
      - ./hazelcast/hazelcast.yaml:/hazelcast.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - robotops-net

  hazelcast3:
    image: hazelcast/hazelcast:${HAZELCAST_VERSION:-5.3}
    environment:
      HZ_CLUSTERNAME: ${HAZELCAST_CLUSTER_NAME:-robotops-hz}
      JDK_JAVA_OPTIONS: "-Dhazelcast.config=/hazelcast.yaml"
    volumes:
      - ./hazelcast/hazelcast.yaml:/hazelcast.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - robotops-net

networks:
  robotops-net:
    driver: bridge

volumes:
  auth-db-data:
  mission-db-data:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  redis-data: