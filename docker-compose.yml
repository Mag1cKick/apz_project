version: "3.8"

services:

  # ─────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service-1
      - auth-service-2
      - robot-service
      - mission-service
    restart: unless-stopped
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Auth Service  (2 instances — HA + Redis)
  # ─────────────────────────────────────────
  auth-service-1:
    build: ./auth-service
    ports:
      - "8001:8001"
    environment:
      SERVICE_PORT: 8001
      POSTGRES_URL: postgresql+asyncpg://auth_user:auth_pass@auth-db:5432/auth_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-robotops-secret-change-me}
      JWT_EXPIRE_MINUTES: 60
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - robotops-net

  auth-service-2:
    build: ./auth-service
    environment:
      SERVICE_PORT: 8001
      POSTGRES_URL: postgresql+asyncpg://auth_user:auth_pass@auth-db:5432/auth_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-robotops-secret-change-me}
      JWT_EXPIRE_MINUTES: 60
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Robot Service  (MongoDB Replica Set)
  # ─────────────────────────────────────────
  robot-service:
    build: ./robot-service
    ports:
      - "8002:8002"
    environment:
      SERVICE_PORT: 8002
      MONGO_URI: mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0
      MONGO_DB: robot_db
      JWT_SECRET: ${JWT_SECRET:-robotops-secret-change-me}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Mission Service  (PostgreSQL + Hazelcast Queue)
  # ─────────────────────────────────────────
  mission-service:
    build: ./mission-service
    ports:
      - "8003:8003"
    environment:
      SERVICE_PORT: 8003
      POSTGRES_URL: postgresql+asyncpg://mission_user:mission_pass@mission-db:5432/mission_db
      HAZELCAST_MEMBERS: hazelcast1:5701,hazelcast2:5701,hazelcast3:5701
      HAZELCAST_CLUSTER_NAME: robotops-hz
      JWT_SECRET: ${JWT_SECRET:-robotops-secret-change-me}
    depends_on:
      mission-db:
        condition: service_healthy
      hazelcast1:
        condition: service_healthy
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # PostgreSQL — Auth
  # ─────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
      POSTGRES_DB: auth_db
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # PostgreSQL — Missions
  # ─────────────────────────────────────────
  mission-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mission_user
      POSTGRES_PASSWORD: mission_pass
      POSTGRES_DB: mission_db
    volumes:
      - mission-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mission_user -d mission_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # MongoDB Replica Set  (3 nodes)
  # ─────────────────────────────────────────
  mongo1:
    image: mongo:6
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo1-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo2:
    image: mongo:6
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo2-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo3:
    image: mongo:6
    command: mongod --replSet rs0 --bind_ip_all
    volumes:
      - mongo3-data:/data/db
    networks:
      - robotops-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo-init:
    image: mongo:6
    restart: "no"
    depends_on:
      mongo1:
        condition: service_healthy
      mongo2:
        condition: service_healthy
      mongo3:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - >
        mongosh --host mongo1:27017 --eval
        "rs.status().ok === 1 ? print('already initialized') :
        rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo1:27017',priority:2},{_id:1,host:'mongo2:27017',priority:1},{_id:2,host:'mongo3:27017',priority:1}]})"
        || true
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Redis  (JWT store, shared across auth instances)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - robotops-net

  # ─────────────────────────────────────────
  # Hazelcast Cluster  (3 nodes — Queue + Map)
  # ─────────────────────────────────────────
  hazelcast1:
    image: hazelcast/hazelcast:5.3
    environment:
      HZ_CLUSTERNAME: robotops-hz
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5701/hazelcast/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - robotops-net

  hazelcast2:
    image: hazelcast/hazelcast:5.3
    environment:
      HZ_CLUSTERNAME: robotops-hz
    networks:
      - robotops-net

  hazelcast3:
    image: hazelcast/hazelcast:5.3
    environment:
      HZ_CLUSTERNAME: robotops-hz
    networks:
      - robotops-net

networks:
  robotops-net:
    driver: bridge

volumes:
  auth-db-data:
  mission-db-data:
  mongo1-data:
  mongo2-data:
  mongo3-data:
  redis-data:
